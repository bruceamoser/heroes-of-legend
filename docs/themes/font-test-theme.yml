# Font Comparison Test Theme — Heroes of Legend
# Tests each font family via role-based switching
extends: default

font:
  catalog:
    Liberation Serif:
      normal: fonts/LiberationSerif-Regular.ttf
      bold: fonts/LiberationSerif-Bold.ttf
      italic: fonts/LiberationSerif-Italic.ttf
      bold_italic: fonts/LiberationSerif-BoldItalic.ttf
    EB Garamond:
      normal: fonts/font-test/EBGaramond-Regular.ttf
      bold: fonts/font-test/EBGaramond-Bold.ttf
      italic: fonts/font-test/EBGaramond-Italic.ttf
    Cardo:
      normal: fonts/font-test/Cardo-Regular.ttf
      bold: fonts/font-test/Cardo-Bold.ttf
      italic: fonts/font-test/Cardo-Italic.ttf
    Linux Libertine:
      normal: fonts/font-test/LinLibertine-Regular.otf
      bold: fonts/font-test/LinLibertine-Bold.otf
      italic: fonts/font-test/LinLibertine-Italic.otf
      bold_italic: fonts/font-test/LinLibertine-BoldItalic.otf
    Almendra:
      normal: fonts/font-test/Almendra-Regular.ttf
      bold: fonts/font-test/Almendra-Bold.ttf
      italic: fonts/font-test/Almendra-Italic.ttf
      bold_italic: fonts/font-test/Almendra-BoldItalic.ttf
    Pirata One:
      normal: fonts/font-test/PirataOne-Regular.ttf
      bold: fonts/font-test/PirataOne-Regular.ttf
      italic: fonts/font-test/PirataOne-Regular.ttf
      bold_italic: fonts/font-test/PirataOne-Regular.ttf

base:
  font-color: '#3a2a1a'
  background-color: '#f4e4c1'
  font-family: Liberation Serif
  font-size: 10
  line-height: 1.6
  align: justify

page:
  background-color: '#f4e4c1'
  margin: [20mm, 18mm, 22mm, 18mm]
  size: LETTER

heading:
  h1-font-size: 20
  h1-font-color: '#5a1a0a'
  h2-font-size: 14
  h2-font-color: '#4a2a1a'
  h3-font-size: 11.5
  h3-font-color: '#3a2a1a'

table:
  font-size: 9
  head-background-color: '#5a3a1a'
  head-font-color: '#f4e4c1'
  body-background-color: '#faf6ec'
  body-stripe-background-color: '#f0e8d0'
  border-color: '#8a7a5a'
  border-width: 0.5
  cell-padding: [2, 5, 2, 5]

quote:
  font-style: italic
  border-left-color: '#8b4513'
  border-left-width: 2
  background-color: '#efe0c8'
  padding: [2, 0, 2, 12]

# Font-switching roles
role:
  font-lib-serif:
    font-family: Liberation Serif
  font-eb-garamond:
    font-family: EB Garamond
  font-cardo:
    font-family: Cardo
  font-linux-libertine:
    font-family: Linux Libertine
  font-almendra:
    font-family: Almendra
  font-pirata-one:
    font-family: Pirata One

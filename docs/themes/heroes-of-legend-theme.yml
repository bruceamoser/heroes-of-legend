# Heroes of Legend — asciidoctor-pdf theme
# Style: Fantasy tome — aged parchment, dark brown ink, deep red accents
# Based on structural patterns from Neon Relic theme

extends: default

font:
  catalog:
    Liberation Serif:
      normal: LiberationSerif-Regular.ttf
      bold: LiberationSerif-Bold.ttf
      italic: LiberationSerif-Italic.ttf
      bold_italic: LiberationSerif-BoldItalic.ttf
    Liberation Sans:
      normal: LiberationSans-Regular.ttf
      bold: LiberationSans-Bold.ttf
      italic: LiberationSans-Italic.ttf

base:
  font-color: '#3a2a1a'
  background-color: '#f4e4c1'
  font-family: Liberation Serif
  font-size: 10.5
  line-height: 1.55
  align: justify

page:
  background-color: '#f4e4c1'
  margin: [25mm, 22mm, 28mm, 22mm]
  size: LETTER

title-page:
  background-color: '#e8d8b0'
  title:
    font-size: 28
    font-color: '#5a2a0a'
    margin-top: 80
    align: center

header:
  height: 15mm
  recto:
    left-content: '{page-number}'
    right-content: '{chapter-title}'
  verso:
    left-content: '{chapter-title}'
    right-content: '{page-number}'

footer:
  height: 12mm
  recto:
    center-content: '*Heroes of Legend* — Core Rules'
  verso:
    center-content: '*Heroes of Legend* — Core Rules'

heading:
  h1-font-size: 22
  h1-font-color: '#5a1a0a'
  h1-font-style: bold
  h1-margin-top: 25
  h1-margin-bottom: 12
  h2-font-size: 16
  h2-font-color: '#4a2a1a'
  h2-font-style: bold
  h2-margin-top: 18
  h2-margin-bottom: 8
  h3-font-size: 12.5
  h3-font-color: '#3a2a1a'
  h3-font-style: bold_italic
  h3-margin-top: 12
  h3-margin-bottom: 6
  h4-font-size: 11
  h4-font-color: '#3a2a1a'
  h4-font-style: italic

table:
  font-family: Liberation Sans
  font-size: 9
  head-background-color: '#5a3a1a'
  head-font-color: '#f4e4c1'
  head-font-style: bold
  body-background-color: '#faf6ec'
  body-stripe-background-color: '#f0e8d0'
  border-color: '#8a7a5a'
  border-width: 0.5
  cell-padding: [3, 6, 3, 6]

codespan:
  font-family: Liberation Sans
  font-size: 9
  background-color: '#efe4cc'
  border-color: '#8a7a5a'
  border-width: 0.5

quote:
  font-style: italic
  font-color: '#4a3a2a'
  border-left-color: '#8b4513'
  border-left-width: 3
  padding: [0, 0, 0, 15]
  background-color: '#efe0c8'

sidebar:
  background-color: '#efe0c4'
  border-color: '#8a7a5a'
  border-width: 1

list:
  item-spacing: 2
  marker-font-color: '#8b4513'

toc:
  dot-leader-color: '#8a7a5a'
  title-font-size: 16
  title-font-color: '#5a1a0a'
  title-font-style: bold
  h2-font-style: bold

link:
  font-color: '#5a3a8a'

footnotes:
  font-size: 8

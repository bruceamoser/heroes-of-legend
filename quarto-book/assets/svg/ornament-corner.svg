<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!--
    ornament-corner.svg — Medieval manuscript corner flourish for Heroes of Legend
    Design: Top-left corner ornament with vines, leaves, and geometric knotwork.
    Celtic-inspired line art in dark brown ink with subtle gold accents.
    Used for sidebar boxes, special callouts, and illuminated panels.
    Palette: Dark brown (#3d2b1f), gold (#8a6a2a), medium brown (#5c4033)
  -->
  <defs>
    <style>
      .ink { stroke: #3d2b1f; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .ink-fill { fill: #3d2b1f; }
      .gold { stroke: #8a6a2a; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .gold-fill { fill: #8a6a2a; }
      .mid { stroke: #5c4033; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <!-- Main vine: curves from top-left corner downward and rightward -->
  <path d="M0,0 Q15,5 25,15 Q35,25 40,40 Q45,55 42,70 Q40,80 50,90 Q60,100 80,100"
        class="ink" stroke-width="1.8" />

  <!-- Secondary vine branching off -->
  <path d="M25,15 Q15,25 8,40 Q3,55 2,65"
        class="mid" stroke-width="1.2" />

  <!-- Tertiary vine along top edge -->
  <path d="M0,0 Q25,2 50,5 Q75,8 100,10"
        class="ink" stroke-width="1.5" />

  <!-- Leaf 1: near corner -->
  <path d="M12,8 Q8,2 14,2 Q18,2 12,8 Z" class="ink-fill" />
  <path d="M12,8 Q6,4 10,4 Q14,4 12,8 Z" class="mid" stroke-width="0.5" />

  <!-- Leaf 2: on main vine -->
  <path d="M35,20 Q30,12 38,12 Q42,14 35,20 Z" class="ink-fill" />

  <!-- Leaf 3: on secondary vine -->
  <path d="M5,55 Q0,50 6,48 Q10,48 5,55 Z" class="ink-fill" />

  <!-- Leaf 4: near bottom -->
  <path d="M55,75 Q52,68 60,66 Q64,68 55,75 Z" class="ink-fill" />

  <!-- Leaf 5: top edge -->
  <path d="M65,8 Q62,2 68,4 Q72,6 65,8 Z" class="mid-fill" />

  <!-- Leaf 6 -->
  <path d="M85,95 Q82,88 90,86 Q94,88 85,95 Z" class="ink-fill" />

  <!-- Small berry/cluster accents in gold -->
  <circle cx="20" cy="35" r="2.5" class="gold-fill" />
  <circle cx="22" cy="30" r="2" class="gold-fill" />
  <circle cx="18" cy="32" r="1.8" class="gold-fill" />

  <circle cx="45" cy="55" r="2.5" class="gold-fill" />
  <circle cx="48" cy="51" r="2" class="gold-fill" />

  <circle cx="70" cy="15" r="2" class="gold-fill" />

  <!-- Knotwork detail near the corner origin -->
  <path d="M2,8 Q8,12 4,18 Q10,22 6,28" class="gold" stroke-width="1.2" />
  <path d="M8,2 Q12,8 18,4 Q22,10 28,6" class="gold" stroke-width="1.2" />

  <!-- Tiny ornamental dot at the corner origin -->
  <circle cx="2" cy="2" r="3" class="ink-fill" />
  <circle cx="2" cy="2" r="1.5" class="gold-fill" />
</svg>

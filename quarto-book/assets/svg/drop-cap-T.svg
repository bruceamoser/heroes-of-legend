<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!--
    drop-cap-T.svg — Illuminated drop capital "T" for Heroes of Legend
    Design: The letter "T" in illuminated manuscript style with vine/leaf flourishes.
    Dark brown ink (#3d2b1f) with subtle gold accents (#8a6a2a).
    Used as the first letter of each chapter opening.
  -->
  <defs>
    <style>
      .ink { stroke: #3d2b1f; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .ink-fill { fill: #3d2b1f; }
      .gold { stroke: #8a6a2a; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .gold-fill { fill: #8a6a2a; }
      .mid { stroke: #5c4033; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .bg { fill: #f4e4c1; }
    </style>
  </defs>

  <!-- Background (typically transparent; parchment for standalone preview) -->
  <rect width="80" height="80" fill="none" />

  <!-- Outer ornamental border -->
  <rect x="3" y="3" width="74" height="74" rx="2" class="mid" stroke-width="0.8" />

  <!-- Decorative corner accents -->
  <circle cx="6" cy="6" r="2" class="gold-fill" />
  <circle cx="74" cy="6" r="2" class="gold-fill" />
  <circle cx="6" cy="74" r="2" class="gold-fill" />
  <circle cx="74" cy="74" r="2" class="gold-fill" />

  <!-- Main letter "T" body: vertical stem -->
  <rect x="35" y="18" width="10" height="50" rx="1" class="ink-fill" />

  <!-- Main letter "T" crossbar -->
  <rect x="12" y="14" width="56" height="10" rx="1" class="ink-fill" />

  <!-- Gold inner highlight on stem -->
  <rect x="38" y="20" width="4" height="46" rx="0.5" class="gold-fill" opacity="0.6" />

  <!-- Gold inner highlight on crossbar -->
  <rect x="14" y="16" width="52" height="3" rx="0.5" class="gold-fill" opacity="0.6" />

  <!-- Vine flourish: left side, curling from crossbar down -->
  <path d="M12,19 Q6,19 4,24 Q2,30 6,35 Q10,40 8,46 Q6,50 10,54"
        class="ink" stroke-width="1.5" />

  <!-- Leaf on left vine (upper) -->
  <path d="M4,28 Q-2,26 2,22 Q4,24 4,28 Z" class="ink-fill" />

  <!-- Leaf on left vine (lower) -->
  <path d="M8,42 Q4,46 10,48 Q12,46 8,42 Z" class="ink-fill" />

  <!-- Vine flourish: right side, curling from crossbar down -->
  <path d="M68,19 Q74,19 76,24 Q78,30 74,36 Q70,42 72,50 Q74,55 70,58"
        class="ink" stroke-width="1.5" />

  <!-- Leaf on right vine (upper) -->
  <path d="M76,28 Q82,26 78,22 Q76,24 76,28 Z" class="ink-fill" />

  <!-- Leaf on right vine (lower) -->
  <path d="M72,46 Q76,50 70,52 Q68,50 72,46 Z" class="ink-fill" />

  <!-- Vine flourish: top, curling from crossbar upward -->
  <path d="M30,14 Q28,8 32,4 Q36,2 40,4"
        class="mid" stroke-width="1.2" />
  <path d="M50,14 Q52,8 48,4 Q44,2 40,4"
        class="mid" stroke-width="1.2" />

  <!-- Leaf on top vine -->
  <path d="M36,3 Q34,-2 38,0 Q40,2 36,3 Z" class="ink-fill" />

  <!-- Small gold berry clusters -->
  <circle cx="10" cy="52" r="2" class="gold-fill" />
  <circle cx="70" cy="56" r="2" class="gold-fill" />
  <circle cx="40" cy="6" r="2" class="gold-fill" />

  <!-- Serif embellishments on T crossbar ends -->
  <rect x="10" y="12" width="4" height="14" rx="0.5" class="ink-fill" />
  <rect x="66" y="12" width="4" height="14" rx="0.5" class="ink-fill" />

  <!-- Foot serif on T stem -->
  <rect x="30" y="64" width="20" height="5" rx="0.5" class="ink-fill" />
</svg>
